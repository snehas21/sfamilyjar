<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Swear Jar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #ffffff;
    min-height: 100vh;
    padding: 24px 16px 60px;
    color: #1f2937;
  }

  .app {
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  .jar-icon {
    font-size: 60px;
    margin-bottom: 8px;
    animation: sway 3s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg); }
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #111827;
  }

  .subtitle {
    color: #6b7280;
    margin-top: 6px;
    font-size: 1rem;
  }

  section {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  }

  .total-banner {
    text-align: center;
  }

  .total-amount {
    font-size: 3rem;
    font-weight: 800;
    color: #b45309;
  }

  .total-label {
    color: #6b7280;
    margin-top: 4px;
    font-size: 0.95rem;
  }

  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 0;
  }

  .member-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    padding: 20px 16px;
    text-align: center;
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.05);
  }

  .member-avatar {
    font-size: 40px;
    margin-bottom: 8px;
  }

  .member-name {
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    color: #111827;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    width: 100%;
    padding: 2px 4px;
    margin-bottom: 6px;
  }

  .member-name:hover,
  .member-name:focus {
    border-bottom: 1px dashed #9ca3af;
    outline: none;
  }

  .member-count {
    color: #6b7280;
    font-size: 0.9rem;
  }

  .member-amount {
    color: #b45309;
    font-size: 1.4rem;
    font-weight: 800;
    margin: 6px 0 14px;
  }

  .member-actions {
    display: flex;
    gap: 8px;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 0.9rem;
    font-weight: 700;
    transition: transform 0.1s ease, filter 0.15s ease;
  }

  button:active { transform: scale(0.96); }

  .btn-add {
    flex: 1;
    background: linear-gradient(135deg, #06d6a0, #06a97e);
    color: #06281f;
  }

  .btn-remove {
    flex: 1;
    background: #ffffff;
    color: #374151;
    border: 1px solid #d1d5db;
  }

  .btn-remove:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-add:hover:not(:disabled) { filter: brightness(1.08); }
  .btn-remove:hover:not(:disabled) { background: #f3f4f6; }

  .stats-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .stats-header h2, .history-section h2 {
    font-size: 1.2rem;
  }

  select {
    background: #ffffff;
    color: #111827;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.9rem;
    font-family: inherit;
  }

  select option { color: #111827; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    text-align: left;
    padding: 10px 8px;
    font-size: 0.92rem;
  }

  thead th {
    color: #6b7280;
    font-weight: 600;
    border-bottom: 1px solid #e5e7eb;
  }

  tbody tr:not(:last-child) td {
    border-bottom: 1px solid #f3f4f6;
  }

  tfoot td {
    border-top: 2px solid #e5e7eb;
    font-weight: 800;
    color: #b45309;
  }

  .history-section h2 {
    margin-bottom: 14px;
  }

  #historyList {
    list-style: none;
    max-height: 320px;
    overflow-y: auto;
  }

  #historyList li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 6px;
    border-bottom: 1px solid #f3f4f6;
    font-size: 0.9rem;
  }

  #historyList li:last-child { border-bottom: none; }

  .hist-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hist-name { font-weight: 700; color: #111827; }

  .hist-time {
    color: #6b7280;
    font-size: 0.78rem;
  }

  .hist-amount {
    color: #b45309;
    font-weight: 700;
    white-space: nowrap;
  }

  .hist-delete {
    background: #ffffff;
    color: #dc2626;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 0.78rem;
  }

  .hist-delete:hover { background: #fef2f2; }

  .empty-state {
    text-align: center;
    color: #6b7280;
    padding: 20px 0;
    font-size: 0.9rem;
  }

  @media (max-width: 480px) {
    .total-amount { font-size: 2.2rem; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="jar-icon">🫙</div>
      <h1>Family Swear Jar</h1>
      <p class="subtitle">25&cent; a slip. Click a name to rename it.</p>
    </header>

    <section class="total-banner">
      <div class="total-amount" id="totalAmount">$0.00</div>
      <div class="total-label">Total in the jar (all time)</div>
    </section>

    <section class="members-grid" id="membersGrid"></section>

    <section class="stats-section">
      <div class="stats-header">
        <h2>Stats by timeframe</h2>
        <select id="timeframeSelect">
          <option value="thisMonth">This Month</option>
          <option value="lastMonth">Last Month</option>
          <option value="ytd">Since Start of Year</option>
          <option value="allTime">All Time</option>
        </select>
      </div>
      <table>
        <thead>
          <tr><th>Family Member</th><th>Swears</th><th>Amount</th></tr>
        </thead>
        <tbody id="statsBody"></tbody>
        <tfoot>
          <tr><td>Total</td><td id="statsTotalCount">0</td><td id="statsTotalAmount">$0.00</td></tr>
        </tfoot>
      </table>
    </section>

    <section class="history-section">
      <h2>Recent Activity</h2>
      <ul id="historyList"></ul>
    </section>
  </div>

<script>
  const STORAGE_KEY = 'familySwearJar_v1';
  const FINE_AMOUNT = 0.25;

  const DEFAULT_MEMBERS = [
    { id: 'me', name: 'Daddy', avatar: '🙋' },
    { id: 'samridh', name: 'Samridh', avatar: '🧒' },
    { id: 'sulagna', name: 'Sulagna', avatar: '👩' },
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.members) && Array.isArray(parsed.entries)) {
          return parsed;
        }
      }
    } catch (e) { /* fall through to defaults */ }
    return { members: DEFAULT_MEMBERS.map(m => ({ ...m })), entries: [] };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  function addSwear(memberId) {
    state.entries.push({
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 8),
      memberId,
      timestamp: Date.now(),
      amount: FINE_AMOUNT,
    });
    saveState();
    render();
  }

  function removeLastSwear(memberId) {
    for (let i = state.entries.length - 1; i >= 0; i--) {
      if (state.entries[i].memberId === memberId) {
        state.entries.splice(i, 1);
        break;
      }
    }
    saveState();
    render();
  }

  function deleteEntry(entryId) {
    state.entries = state.entries.filter(e => e.id !== entryId);
    saveState();
    render();
  }

  function renameMember(memberId, newName) {
    const member = state.members.find(m => m.id === memberId);
    if (member && newName.trim()) {
      member.name = newName.trim();
      saveState();
      render();
    }
  }

  function memberName(memberId) {
    const m = state.members.find(m => m.id === memberId);
    return m ? m.name : 'Unknown';
  }

  function formatMoney(amount) {
    return '$' + amount.toFixed(2);
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleString(undefined, {
      month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit',
    });
  }

  function timeframeBounds(timeframe) {
    const now = new Date();
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    const startOfYear = new Date(now.getFullYear(), 0, 1).getTime();

    if (timeframe === 'thisMonth') {
      return { start: startOfMonth, end: Infinity };
    }
    if (timeframe === 'lastMonth') {
      const start = new Date(now.getFullYear(), now.getMonth() - 1, 1).getTime();
      return { start, end: startOfMonth };
    }
    if (timeframe === 'ytd') {
      return { start: startOfYear, end: Infinity };
    }
    return { start: -Infinity, end: Infinity };
  }

  function entriesFor(memberId, timeframe) {
    const { start, end } = timeframeBounds(timeframe);
    return state.entries.filter(e =>
      e.memberId === memberId && e.timestamp >= start && e.timestamp < end
    );
  }

  function renderMembers() {
    const grid = document.getElementById('membersGrid');
    grid.innerHTML = '';
    state.members.forEach(member => {
      const allTime = state.entries.filter(e => e.memberId === member.id);
      const total = allTime.reduce((sum, e) => sum + e.amount, 0);

      const card = document.createElement('div');
      card.className = 'member-card';

      const avatar = document.createElement('div');
      avatar.className = 'member-avatar';
      avatar.textContent = member.avatar;

      const nameInput = document.createElement('input');
      nameInput.className = 'member-name';
      nameInput.value = member.name;
      nameInput.addEventListener('change', () => renameMember(member.id, nameInput.value));

      const count = document.createElement('div');
      count.className = 'member-count';
      count.textContent = `${allTime.length} swear${allTime.length === 1 ? '' : 's'} (all time)`;

      const amount = document.createElement('div');
      amount.className = 'member-amount';
      amount.textContent = formatMoney(total);

      const actions = document.createElement('div');
      actions.className = 'member-actions';

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add';
      addBtn.textContent = '+ Add Swear';
      addBtn.addEventListener('click', () => addSwear(member.id));

      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn-remove';
      removeBtn.textContent = '− Remove';
      removeBtn.disabled = allTime.length === 0;
      removeBtn.addEventListener('click', () => removeLastSwear(member.id));

      actions.appendChild(addBtn);
      actions.appendChild(removeBtn);

      card.appendChild(avatar);
      card.appendChild(nameInput);
      card.appendChild(count);
      card.appendChild(amount);
      card.appendChild(actions);

      grid.appendChild(card);
    });
  }

  function renderStats() {
    const timeframe = document.getElementById('timeframeSelect').value;
    const body = document.getElementById('statsBody');
    body.innerHTML = '';

    let totalCount = 0;
    let totalAmount = 0;

    state.members.forEach(member => {
      const entries = entriesFor(member.id, timeframe);
      const amount = entries.reduce((sum, e) => sum + e.amount, 0);
      totalCount += entries.length;
      totalAmount += amount;

      const row = document.createElement('tr');
      const nameCell = document.createElement('td');
      nameCell.textContent = member.name;
      const countCell = document.createElement('td');
      countCell.textContent = entries.length;
      const amountCell = document.createElement('td');
      amountCell.textContent = formatMoney(amount);
      row.appendChild(nameCell);
      row.appendChild(countCell);
      row.appendChild(amountCell);
      body.appendChild(row);
    });

    document.getElementById('statsTotalCount').textContent = totalCount;
    document.getElementById('statsTotalAmount').textContent = formatMoney(totalAmount);
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';

    const sorted = [...state.entries].sort((a, b) => b.timestamp - a.timestamp).slice(0, 50);

    if (sorted.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty-state';
      li.style.justifyContent = 'center';
      li.style.borderBottom = 'none';
      li.textContent = 'No swears logged yet. Keep it up!';
      list.appendChild(li);
      return;
    }

    sorted.forEach(entry => {
      const li = document.createElement('li');

      const info = document.createElement('div');
      info.className = 'hist-info';
      const name = document.createElement('span');
      name.className = 'hist-name';
      name.textContent = memberName(entry.memberId);
      const time = document.createElement('span');
      time.className = 'hist-time';
      time.textContent = formatTime(entry.timestamp);
      info.appendChild(name);
      info.appendChild(time);

      const amount = document.createElement('span');
      amount.className = 'hist-amount';
      amount.textContent = formatMoney(entry.amount);

      const delBtn = document.createElement('button');
      delBtn.className = 'hist-delete';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => deleteEntry(entry.id));

      li.appendChild(info);
      li.appendChild(amount);
      li.appendChild(delBtn);
      list.appendChild(li);
    });
  }

  function renderTotal() {
    const total = state.entries.reduce((sum, e) => sum + e.amount, 0);
    document.getElementById('totalAmount').textContent = formatMoney(total);
  }

  function render() {
    renderTotal();
    renderMembers();
    renderStats();
    renderHistory();
  }

  document.getElementById('timeframeSelect').addEventListener('change', renderStats);

  render();
</script>
</body>
</html>
